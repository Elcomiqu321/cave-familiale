<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventaire Cave</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body onload="initInventaire()">
  <div class="main-container">
    <nav class="top-nav">
      <h1>Inventaire de la Cave</h1>
      <div class="nav-buttons">
        <button onclick="window.location.href='journal.html'">Journal</button>
        <button onclick="logout()">Déconnexion</button>
      </div>
    </nav>

    <div class="filters">
      <input type="text" id="filterAppellation" placeholder="Appellation" oninput="applyFilters()" onkeydown="if(event.key==='Enter')applyFilters()">
      <input type="text" id="filterClimat" placeholder="Climat" oninput="applyFilters()" onkeydown="if(event.key==='Enter')applyFilters()">
      <input type="text" id="filterMillesime" placeholder="Millésime" inputmode="numeric" oninput="applyFilters()" onkeydown="if(event.key==='Enter')applyFilters()">
      <input type="text" id="filterCouleur" placeholder="Couleur" oninput="applyFilters()" onkeydown="if(event.key==='Enter')applyFilters()">
    </div>

    <!-- Basket panel -->
    <div id="basketPanel" class="basket-panel hidden">
      <div class="basket-header">
        <h2>Panier de retrait</h2>
        <span id="basketCount" class="basket-count">0</span>
      </div>
      <div id="basketItems" class="basket-items"></div>
      <div class="basket-actions">
        <button class="btn-clear" onclick="clearBasket()">Vider</button>
        <button class="btn-confirm" onclick="confirmWithdrawal()">Confirmer le retrait</button>
      </div>
    </div>

    <!-- Basket toggle button (floating) -->
    <button id="basketToggle" class="basket-toggle hidden" onclick="toggleBasket()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span id="basketToggleCount">0</span>
    </button>

    <div class="table-wrapper">
      <table id="winesTable" class="wines-table">
        <thead>
          <tr>
            <th class="sortable" onclick="sortWines('appellation')">Appellation <span class="sort-arrow" id="sort-appellation"></span></th>
            <th class="sortable" onclick="sortWines('climat')">Climat <span class="sort-arrow" id="sort-climat"></span></th>
            <th class="sortable" onclick="sortWines('millesime')">Millésime <span class="sort-arrow" id="sort-millesime"></span></th>
            <th class="sortable" onclick="sortWines('couleur')">Couleur <span class="sort-arrow" id="sort-couleur"></span></th>
            <th class="sortable" onclick="sortWines('quantite')">Qté <span class="sort-arrow" id="sort-quantite"></span></th>
            <th class="sortable" onclick="sortWines('emplacement')">Emplacement <span class="sort-arrow" id="sort-emplacement"></span></th>
            <th>Retirer</th>
          </tr>
        </thead>
        <tbody id="winesList">
          <tr><td colspan="7" class="loading-msg">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
